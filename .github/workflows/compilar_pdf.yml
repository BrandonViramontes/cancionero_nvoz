name: Compilar y Publicar PDF de LaTeX

on:
  push:
    branches:
      - main  # Se ejecuta cada vez que subes cambios a la rama 'main'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  
jobs:
  build_latex:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Permiso obligatorio para que GitHub pueda publicar el PDF

    steps:
      # 1. Copiar el código de tu repositorio al servidor de GitHub
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      # 2. Compilar usando LaTeXmk (leerá tu archivo latexmkrc automáticamente)
      - name: Compilar LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: nvoz.tex
          # Forzamos el uso de latexmk si tu latexmkrc requiere parámetros específicos
          compiler: latexmk
          # Le indicamos que use el archivo de salida build como haces localmente
          args: -pdf -shell-escape -outdir=build -interaction=nonstopmode

      # 3. Crear una etiqueta (tag) automática para el lanzamiento
      - name: Crear etiqueta de versión
        id: tag
        run: echo "version=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      # 4. Publicar el PDF (lo buscamos dentro de la carpeta build)
      - name: Publicar PDF en Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Cancionero - ${{ steps.tag.outputs.version }}
          files: build/nvoz.pdf  # <--- Apunta a la carpeta build del servidor

       # NUEVO PASO: Subir el PDF a la rama de vista previa
            # NUEVO PASO: Uso seguro de variables de entorno nativas de Linux
      - name: Actualizar PDF en rama de vista previa
        env:
          MY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Estructura de carpetas solicitada
          mkdir -p pdf_cancionero
          cp build/nvoz.pdf pdf_cancionero/
          
          git init
          git checkout --orphan pdf-preview
          git add pdf_cancionero/
          git commit -m "Actualizar vista previa del cancionero"
          
          # Usamos las variables nativas del sistema operativo ($MY_TOKEN y $GITHUB_REPOSITORY)
          git push "https://x-access-token:$MY_TOKEN@://github.com" pdf-preview --force
