name: Compilar y Publicar PDF de LaTeX

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write      # Permiso para activar la página web
  id-token: write   # Permiso de seguridad requerido por GitHub Pages

jobs:
  build_latex:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4

      - name: Compilar LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: nvoz.tex
          compiler: latexmk
          args: -pdf -shell-escape -outdir=build -interaction=nonstopmode

      - name: Crear etiqueta de versión
        id: tag
        run: echo "version=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Publicar PDF en Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Cancionero - ${{ steps.tag.outputs.version }}
          files: build/nvoz.pdf

      # PASO DE VISTA PREVIA: Prepara el PDF para la web de GitHub Pages
      - name: Organizar archivo web
        run: |
          mkdir -p _site
          cp build/nvoz.pdf _site/

      - name: Subir artefacto web
        uses: actions/upload-pages-artifact@v3

  deploy_pages:
    needs: build_latex
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
